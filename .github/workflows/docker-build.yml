name: Build and Push to Docker Hub (Manual Version)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '镜像版本号（例如 1.01）'
        required: true
        default: '1.02'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xyzjk:${{ github.event.inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/xyzjk:latest
