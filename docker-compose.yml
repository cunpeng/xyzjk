version: '3.8'

services:
  xyz-monitor:
    build: .
    container_name: xyzjk
    ports:
      - "6821:6821"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    stop_grace_period: 10s
    environment:
      - TZ=Asia/Shanghai
      - NODE_OPTIONS=--max-old-space-size=64
