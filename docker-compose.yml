version: '3.8'

services:
  xyz-monitor:
    build: .
    container_name: xyzjk
    ports:
      - "6821:6821"
    volumes:
      - ./data:/app/data
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - NODE_OPTIONS=--max-old-space-size=128
    mem_limit: 256m
    memswap_limit: 256m
