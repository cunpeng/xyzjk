version: '3.8'

services:
  xyz-monitor:
    build: .
    container_name: xyzjk
    ports:
      - "6821:6821"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    stop_grace_period: 5s
    environment:
      - TZ=Asia/Shanghai
      - NODE_OPTIONS=--max-old-space-size=64
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6821/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
